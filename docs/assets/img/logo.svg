<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#2e9bde"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <clipPath id="outerClip">
      <rect width="32" height="32" rx="9"/>
    </clipPath>
  </defs>
  <!-- Gradient background with slight blur (mirrors CSS filter:blur(0.5px)) -->
  <rect width="32" height="32" rx="9" fill="url(#logoGrad)" filter="url(#softBlur)"/>
  <!-- Inner dark panel -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#0b0b14"/>
  <!-- "po" text: p=white, o=accent -->
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="600"
    letter-spacing="-0.5"
  ><tspan fill="#ffffff">p</tspan><tspan fill="#8b5cf6">o</tspan></text>
</svg>
